spring:
  datasource:
    # Use H2 in-memory database for tests
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop  # Auto-create schema from entities
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false  # Set to true for debugging

  flyway:
    enabled: false  # Disable Flyway for tests - use Hibernate schema generation

  # Disable security for tests
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999  # Dummy issuer for tests

# Temporal configuration for tests (not used with TestWorkflowEnvironment)
riven:
  rate-limit:
    enabled: false
  connector:
    enabled: true
    credential-encryption-key: 07b4f399f390a1ff9226d2b66f8c3b3a03f0fa89cae1b928e83ee47e6addfe12
  posthog:
    enabled: false
  websocket:
    endpoint: /ws
    server-heartbeat-ms: 0
    client-heartbeat-ms: 0
  workflow:
    engine:
      target: localhost:7233  # Ignored by TestWorkflowEnvironment
      namespace: default
      enabled: true

storage:
  provider: local
  local:
    base-path: ${java.io.tmpdir}/riven-test-storage
  signed-url:
    secret: test-hmac-secret-for-unit-tests
    default-expiry-seconds: 3600
    max-expiry-seconds: 86400
  presigned-upload:
    expiry-seconds: 900
  supabase:
    bucket: test-bucket
  s3:
    bucket: test-bucket
    region: us-east-1
    access-key-id: test-key
    secret-access-key: test-secret

# Logging
logging:
  level:
    riven.core: INFO
    io.temporal: WARN
    org.springframework: WARN
    org.hibernate: WARN

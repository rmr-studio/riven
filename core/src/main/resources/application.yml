spring:
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 10MB
  application:
    name: core
  datasource:
    url: ${POSTGRES_DB_JDBC}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: none
    show-sql: ${riven.include-stack-trace}
  flyway:
    enabled: false
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_AUTH_URL}
  temporal:
    workers-auto-discovery:
      packages:
        - riven.core.service.workflow
server:
  port: ${SERVER_PORT}
riven:
  security:
    jwt-secret-key: ${JWT_SECRET_KEY}
    jwt-issuer: ${SUPABASE_URL}
    allowed-origins:
      - ${ORIGIN_API_URL}
      - http://localhost:3000
      - http://localhost:3002
  include-stack-trace: true
  supabase-url: ${SUPABASE_URL}
  supabase-key: ${SUPABASE_KEY}
  web-origin: ${ORIGIN_API_URL}
  nango:
    secret-key: ${NANGO_SECRET_KEY:}
    base-url: ${NANGO_BASE_URL:https://api.nango.dev}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    authenticated-rpm: ${RATE_LIMIT_AUTHENTICATED_RPM:200}
    anonymous-rpm: ${RATE_LIMIT_ANONYMOUS_RPM:30}
    cache-max-size: 10000
    cache-expire-minutes: 10
  posthog:
    enabled: ${POSTHOG_ENABLED:false}
    api-key: ${POSTHOG_API_KEY:}
    host: ${POSTHOG_HOST:https://us.i.posthog.com}
  workflow:
    engine:
      target: ${TEMPORAL_SERVER_ADDRESS}
  websocket:
    endpoint: /ws
    server-heartbeat-ms: 10000
    client-heartbeat-ms: 10000
    max-message-size-bytes: 65536
    send-buffer-size-bytes: 524288
    send-timeout-ms: 15000
  query:
    timeout-seconds: 10
storage:
  provider: local
  local:
    base-path: ./storage
  signed-url:
    secret: ${STORAGE_SIGNED_URL_SECRET}
    default-expiry-seconds: 3600
    max-expiry-seconds: 86400
  presigned-upload:
    expiry-seconds: 900
  supabase:
    bucket: ${STORAGE_SUPABASE_BUCKET:riven-storage}
  s3:
    bucket: ${STORAGE_S3_BUCKET:riven-storage}
    region: ${STORAGE_S3_REGION:us-east-1}
    access-key-id: ${STORAGE_S3_ACCESS_KEY_ID:}
    secret-access-key: ${STORAGE_S3_SECRET_ACCESS_KEY:}
    endpoint-url: ${STORAGE_S3_ENDPOINT_URL:}
springdoc:
  api-docs:
    path: /docs/v3/api-docs
  swagger-ui:
    path: /docs/swagger-ui.html

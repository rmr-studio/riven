# Hypersistence-utils-hibernate-71 configuration (Phase 03.1-04 closure fix).
#
# Hibernate 7's AbstractSaveEventListener#cloneAndSubstituteValues requires JSONB payloads
# to be deep-cloneable. The default ObjectMapperJsonSerializer delegates to Java serialization,
# which forces every non-JsonNode JSONB attribute (and its inner children) to implement
# Serializable — our Kotlin domain data classes (e.g. ColumnConfiguration) do not, and would
# otherwise throw NonSerializableObjectException at persist time.
#
# Swap in a Jackson round-trip clone so deep-copy works for any type the application's
# ObjectMapper can round-trip — the same contract already required for the DB payload itself.
hypersistence.utils.json.serializer=riven.core.configuration.util.JacksonRoundTripJsonSerializer
